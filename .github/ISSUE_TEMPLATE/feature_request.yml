name: "Feature request / 功能建议"
description: "Suggest a TRAE Work Dream Skin improvement"
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: input
    id: summary
    attributes:
      label: 一句话概括
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: 使用场景与期望方案
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: 范围确认
      options:
        - label: 需求与 TRAE Work 外观或主题工具有关
          required: true
        - label: 需求不要求修改官方应用文件
          required: true
