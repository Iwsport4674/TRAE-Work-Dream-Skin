name: "Bug report / 缺陷反馈"
description: "Report an install, inject, layout, verify, or restore problem"
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        请先运行 `macos/scripts/doctor-macos.sh` 和 Verify。不要粘贴账号、会话、项目内容、密钥或完整隐私日志。
  - type: input
    id: macos
    attributes:
      label: macOS 与 CPU
      placeholder: "macOS 26.x · Apple Silicon"
    validations:
      required: true
  - type: input
    id: trae
    attributes:
      label: TRAE Work 版本
      placeholder: "0.1.30"
    validations:
      required: true
  - type: input
    id: skin
    attributes:
      label: Dream Skin 版本
      placeholder: "0.2.0"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: 期望与实际结果
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Doctor / Verify 的已脱敏输出
    validations:
      required: false
  - type: checkboxes
    id: confirm
    attributes:
      label: 确认
      options:
        - label: 我使用的是官方 TRAE Work 安装包
          required: true
        - label: 我没有粘贴账号、项目内容或密钥
          required: true
